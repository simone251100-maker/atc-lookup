<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATC Radar Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --text: #fff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 20px 15px; }
        
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0 15px 0; z-index: 10; border-bottom: 1px solid #222; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* Pulsante Update */
        .btn-update { 
            background: #2c2c2e; border: none; color: var(--primary); 
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; 
            text-transform: uppercase; cursor: pointer;
        }
        .btn-update:active { opacity: 0.5; }

        .search-box { display: flex; gap: 8px; }
        input { flex: 1; padding: 16px; border-radius: 12px; border: 1px solid #333; background: var(--card); color: #fff; font-size: 18px; outline: none; -webkit-appearance: none; }
        .btn-clear { padding: 0 15px; background: #2c2c2e; border: none; border-radius: 12px; color: #8e8e93; font-weight: 600; }

        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-top: 15px; border-left: 6px solid var(--primary); }
        .company { font-size: 12px; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
        .icao-code { font-size: 38px; font-weight: 900; font-family: monospace; color: var(--primary); line-height: 1; }
        .callsign { font-size: 22px; color: var(--success); font-weight: 700; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="status-bar">
            <h2 style="margin:0; font-size: 18px;">✈️ ATC Radar</h2>
            <button class="btn-update" onclick="forceUpdate()">Update App</button>
        </div>
        <div class="search-box">
            <input type="text" id="search" placeholder="ICAO (ITY, RYR...)" autocomplete="off" oninput="runSearch()">
            <button class="btn-clear" onclick="pulisci()">Reset</button>
        </div>
        <div id="stat" style="font-size: 10px; color: #444; margin-top: 8px; text-align: center;">Loading...</div>
    </div>

    <div id="results"></div>

    <script>
        // Funzione per forzare l'aggiornamento e pulire la cache
        async function forceUpdate() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }
            }
            // Svuota le cache del browser
            if ('caches' in window) {
                const names = await caches.keys();
                for (let name of names) await caches.delete(name);
            }
            // Ricarica la pagina ignorando la cache del server
            window.location.reload(true);
        }

        let database = [];

        async function init() {
            try {
                // Fetch con timestamp per evitare cache sul file data.json
                const response = await fetch('data.json?v=' + Date.now());
                database = await response.json();
                document.getElementById('stat').innerText = `${database.length} AIRLINES LOADED`;
            } catch (e) { document.getElementById('stat').innerText = "OFFLINE"; }
        }

        function runSearch() {
            const query = document.getElementById('search').value.toUpperCase().trim();
            const container = document.getElementById('results');
            container.innerHTML = "";
            if (query.length < 2) return;

            let risultati = database.filter(item => {
                const code = (item.icao || item.ICAO || "").toString().toUpperCase().trim();
                const name = (item.company || item.Company || "").toString().toUpperCase();
                return query.length === 3 ? code === query : (name.includes(query) || code.includes(query));
            });

            if (risultati.length > 0 && query.length === 3 && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }

            risultati.slice(0, 15).forEach(item => {
                const vIcao = (item.icao || item.ICAO || "---").toUpperCase();
                const vComp = (item.company || item.Company || "Unknown");
                const vCall = (item.callsign || item.Callsign || "No Radio");
                container.innerHTML += `
                    <div class="card">
                        <div class="company">${vComp}</div>
                        <div class="icao-code">${vIcao}</div>
                        <div class="callsign">🎙️ ${vCall}</div>
                    </div>`;
            });
        }

        function pulisci() {
            document.getElementById('search').value = "";
            document.getElementById('results').innerHTML = "";
        }

        init();
    </script>
</body>
</html>
