<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATC Radar Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --text: #fff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 20px 15px; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0 15px 0; z-index: 10; border-bottom: 1px solid #222; }
        .search-box { display: flex; gap: 8px; margin-top: 10px; }
        input { flex: 1; padding: 16px; border-radius: 12px; border: 1px solid #333; background: var(--card); color: #fff; font-size: 18px; outline: none; -webkit-appearance: none; }
        .btn-clear { padding: 0 15px; background: #2c2c2e; border: none; border-radius: 12px; color: #8e8e93; font-weight: 600; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 10px; border-left: 6px solid #333; }
        .match-exact { border-left-color: var(--primary); background: #1c2530; }
        .company { font-size: 12px; color: #8e8e93; text-transform: uppercase; margin-bottom: 2px; }
        .icao-code { font-size: 30px; font-weight: 900; font-family: monospace; color: var(--primary); }
        .callsign { font-size: 20px; color: var(--success); font-weight: 700; margin-top: 4px; }
        .info-db { font-size: 10px; color: #444; text-align: right; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0">✈️ ATC Radar</h2>
            <div id="stat" class="info-db">Sync...</div>
        </div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Inserisci ICAO (es. ITY, RYR)" autocomplete="off" oninput="runSearch()">
            <button class="btn-clear" onclick="resetSearch()">Reset</button>
        </div>
    </div>

    <div id="results"></div>

    <script>
        let db = [];

        async function init() {
            try {
                const r = await fetch('data.json');
                db = await r.json();
                document.getElementById('stat').innerText = `${db.length} RECORDS`;
            } catch (e) { document.getElementById('stat').innerText = "DB ERROR"; }
        }

        // FUNZIONE SCANNER UNIVERSALE
        function getVal(obj, keys) {
            for (let k of keys) {
                if (obj[k]) return obj[k].toString().trim();
                if (obj[k.toUpperCase()]) return obj[k.toUpperCase()].toString().trim();
                if (obj[k.toLowerCase()]) return obj[k.toLowerCase()].toString().trim();
            }
            return "";
        }

        function runSearch() {
            const q = document.getElementById('search').value.toUpperCase().trim();
            const container = document.getElementById('results');
            container.innerHTML = "";
            if (q.length < 2) return;

            const filtered = db.filter(item => {
                // Cerchiamo l'ICAO in ogni possibile variante di nome chiave
                const icao = getVal(item, ['icao', 'ICAO', 'code', 'airline_icao']);
                const comp = getVal(item, ['company', 'name', 'airline', 'airline_name']);
                const call = getVal(item, ['callsign', 'telephony', 'radio']);

                return icao.toUpperCase() === q || icao.toUpperCase().includes(q) || 
                       comp.toUpperCase().includes(q) || call.toUpperCase().includes(q);
            });

            // Ordinamento: Match Esatto ICAO sempre primo
            filtered.sort((a, b) => {
                const aIcao = getVal(a, ['icao', 'ICAO', 'code']).toUpperCase();
                const bIcao = getVal(b, ['icao', 'ICAO', 'code']).toUpperCase();
                if (aIcao === q) return -1;
                if (bIcao === q) return 1;
                return 0;
            });

            filtered.slice(0, 15).forEach(item => {
                const vIcao = getVal(item, ['icao', 'ICAO', 'code']).toUpperCase() || "---";
                const vComp = getVal(item, ['company', 'name', 'airline']) || "Unknown";
                const vCall = getVal(item, ['callsign', 'telephony', 'radio']) || "N/A";
                const isExact = vIcao === q;

                container.innerHTML += `
                    <div class="card ${isExact ? 'match-exact' : ''}">
                        <div class="company">${vComp}</div>
                        <div class="icao-code">${vIcao}</div>
                        <div class="callsign">🎙️ ${vCall}</div>
                    </div>`;
            });
        }

        function resetSearch() {
            document.getElementById('search').value = "";
            document.getElementById('results').innerHTML = "";
            document.getElementById('search').focus();
        }

        init();
    </script>
</body>
</html>
