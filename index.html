<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATC Radar</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
               background: #000; color: #fff; margin: 0; padding: 20px; }
        .search-container { position: sticky; top: 0; background: #000; padding-bottom: 15px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; 
                background: #1c1c1e; color: white; font-size: 18px; box-sizing: border-box; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
                border-left: 4px solid #0a84ff; animation: fadeIn 0.3s ease; }
        .icao { color: #0a84ff; font-weight: bold; font-family: monospace; font-size: 20px; }
        .company { font-size: 16px; margin-bottom: 4px; color: #efeff4; }
        .callsign { color: #30d158; font-style: italic; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="search-container">
        <h2 style="margin-top:0">✈️ ATC Lookup</h2>
        <input type="text" id="search" placeholder="Inserisci ICAO o Nome..." oninput="cerca()">
    </div>
    <div id="results"></div>

    <script>
        let database = [];

        // Carica il database unico
        async function init() {
            const res = await fetch('data.json');
            database = await res.json();
        }

        function cerca() {
            const q = document.getElementById('search').value.toUpperCase().trim();
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "";
            if (q.length < 2) return;

            // Filtro: prima ICAO esatto, poi il resto
            const filtrati = database.filter(item => 
                item.icao.toUpperCase() === q || 
                item.company.toUpperCase().includes(q) ||
                item.callsign.toUpperCase().includes(q)
            ).slice(0, 20);

            filtrati.forEach(item => {
                resDiv.innerHTML += `
                    <div class="card">
                        <div class="company">${item.company}</div>
                        <div class="icao">${item.icao}</div>
                        <div class="callsign">🎙️ ${item.callsign}</div>
                    </div>`;
            });
        }
        init();
    </script>
</body>
</html>
