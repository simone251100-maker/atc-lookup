<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATC Radar Lookup</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --text: #fff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { position: sticky; top: 0; background: var(--bg); padding-bottom: 15px; z-index: 10; }
        .search-box { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: var(--card); color: #fff; font-size: 18px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-clear { padding: 0 15px; background: var(--card); border: 1px solid #333; border-radius: 12px; color: #8e8e93; }
        .card { background: var(--card); padding: 16px; border-radius: 14px; margin-bottom: 12px; border-left: 5px solid var(--primary); }
        .company { font-size: 13px; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
        .icao { font-size: 26px; font-weight: 800; font-family: monospace; color: var(--primary); }
        .callsign { font-size: 17px; color: var(--success); font-style: italic; margin-top: 5px; }
        .status { font-size: 12px; color: #444; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>✈️ ATC Lookup</h2>
        <div id="db-status" class="status">Caricamento database...</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Inserisci ICAO (es. ITY)" autocomplete="off" oninput="cerca()">
            <button class="btn-clear" onclick="pulisci()">Reset</button>
        </div>
    </div>

    <div id="results"></div>

    <script>
        let database = [];

        async function init() {
            try {
                const res = await fetch('data.json');
                database = await res.json();
                document.getElementById('db-status').innerText = `Database pronto: ${database.length} record.`;
            } catch (e) {
                document.getElementById('db-status').innerText = "Errore caricamento data.json!";
            }
        }

        function cerca() {
            const query = document.getElementById('search').value.toUpperCase().trim();
            const container = document.getElementById('results');
            container.innerHTML = "";

            if (query.length < 2) return;

            // FILTRO ULTRA-PRECISO
            // Usiamo .trim() su ogni campo del database per eliminare spazi nascosti
            const risultati = database.filter(item => {
                const icao = (item.icao || "").toUpperCase().trim();
                const comp = (item.company || "").toUpperCase().trim();
                const call = (item.callsign || "").toUpperCase().trim();

                // 1. Priorità: Match ESATTO dell'ICAO
                if (icao === query) return true;
                
                // 2. Seconda scelta: ICAO che inizia con la query o nome che contiene la query
                return icao.startsWith(query) || comp.includes(query) || call.includes(query);
            });

            // ORDINA I RISULTATI: Metti i match ICAO esatti in cima
            risultati.sort((a, b) => {
                if (a.icao.toUpperCase().trim() === query) return -1;
                if (b.icao.toUpperCase().trim() === query) return 1;
                return 0;
            });

            if (risultati.length === 0) {
                container.innerHTML = '<div style="color:#666; text-align:center; margin-top:20px;">Nessun risultato.</div>';
                return;
            }

            risultati.slice(0, 20).forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <div class="company">${item.company}</div>
                        <div class="icao">${item.icao}</div>
                        <div class="callsign">🎙️ ${item.callsign}</div>
                    </div>`;
            });
        }

        function pulisci() {
            document.getElementById('search').value = "";
            document.getElementById('results').innerHTML = "";
            document.getElementById('search').focus();
        }

        init();
    </script>
</body>
</html>
