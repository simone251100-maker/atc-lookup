<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATC Radar Precision</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --text: #fff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 20px 15px; overflow-x: hidden; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0 15px 0; z-index: 10; border-bottom: 1px solid #222; }
        .search-box { display: flex; gap: 8px; margin-top: 10px; }
        input { flex: 1; padding: 16px; border-radius: 12px; border: 1px solid #333; background: var(--card); color: #fff; font-size: 18px; outline: none; -webkit-appearance: none; }
        .btn-clear { padding: 0 15px; background: #2c2c2e; border: none; border-radius: 12px; color: #8e8e93; font-weight: 600; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-top: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .company { font-size: 13px; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .icao-code { font-size: 35px; font-weight: 900; font-family: monospace; color: var(--primary); line-height: 1; }
        .callsign { font-size: 22px; color: var(--success); font-weight: 700; margin-top: 8px; border-top: 1px solid #333; padding-top: 8px; }
        .no-results { text-align: center; color: #444; margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">Callsign list      Created By Simone</h2>
        <div class="search-box">
            <input type="text" id="search" placeholder="Inserisci ICAO (ITY, RYR...)" autocomplete="off" oninput="filtraSenzaErrori()">
            <button class="btn-clear" onclick="pulisci()">Reset</button>
        </div>
    </div>

    <div id="results"></div>

    <script>
        let db = [];

        async function init() {
            try {
                const r = await fetch('data.json');
                db = await r.json();
            } catch (e) { console.error("Errore DB"); }
        }

        function filtraSenzaErrori() {
            const q = document.getElementById('search').value.toUpperCase().trim();
            const container = document.getElementById('results');
            container.innerHTML = "";

            if (q.length < 2) return;

            // --- LOGICA RESTRITTIVA ---
            let filtrati = [];

            if (q.length === 3) {
                // Se scrivi 3 lettere, cerca SOLO l'ICAO identico
                filtrati = db.filter(item => {
                    const code = (item.icao || item.ICAO || "").toString().toUpperCase().trim();
                    return code === q;
                });
            } else {
                // Se scrivi più o meno di 3 lettere, cerca nel nome compagnia
                filtrati = db.filter(item => {
                    const name = (item.company || item.Company || "").toString().toUpperCase();
                    const call = (item.callsign || item.Callsign || "").toString().toUpperCase();
                    return name.includes(q) || call.includes(q);
                });
            }

            if (filtrati.length === 0) {
                container.innerHTML = '<div class="no-results">Nessun match esatto per ' + q + '</div>';
                return;
            }

            filtrati.forEach(item => {
                const vIcao = (item.icao || item.ICAO || "---").toUpperCase().trim();
                const vComp = (item.company || item.Company || "Unknown");
                const vCall = (item.callsign || item.Callsign || "No Radio");

                container.innerHTML += `
                    <div class="card">
                        <div class="company">${vComp}</div>
                        <div class="icao-code">${vIcao}</div>
                        <div class="callsign">🎙️ ${vCall}</div>
                    </div>`;
            });
        }

        function pulisci() {
            document.getElementById('search').value = "";
            document.getElementById('results').innerHTML = "";
            document.getElementById('search').focus();
        }

        init();
    </script>
</body>
</html>
